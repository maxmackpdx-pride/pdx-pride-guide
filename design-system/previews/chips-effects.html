<!-- @dsCard group="Effects" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body { margin:0; background:#0a0a0a; color:#fff; font-family:'Inter',sans-serif; padding:28px; }
.lbl { font-size:10px; color:#666; text-transform:uppercase; letter-spacing:0.1em; margin:20px 0 10px; }
.bar { height:3px; background:linear-gradient(90deg,#00FFFF,#CCFF00,#FF00CC,#FF6600); }
.day { display:inline-flex; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.1em; padding:4px 12px; margin-right:8px; color:#000; }
.pill { display:inline-flex; align-items:center; gap:7px; border:1px solid #CCFF00; color:#CCFF00; border-radius:999px; padding:5px 13px; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; }
.pill .dot { width:7px; height:7px; border-radius:50%; background:#CCFF00; animation:blink 1.6s infinite; }
@keyframes blink { 50%{opacity:0.35} }
.phrase { display:flex; align-items:center; gap:10px; padding:10px 14px; background:#111; border:1px solid #2a2a2a; border-radius:6px; max-width:260px; margin-bottom:8px; font-size:13px; cursor:pointer; }
.phrase.active { border-color:var(--pc); }
.phrase .dot { width:10px; height:10px; border-radius:50%; background:var(--pc); }
.phrase:not(.active) .dot { opacity:0.35 }
.spot { background:#0b0b0b; border:1px solid #2b2b2b; padding:16px 18px; max-width:280px; box-shadow:0 0 14px rgba(255,0,204,0.25); animation:spotpulse 4s ease-in-out infinite; }
@keyframes spotpulse { 50%{box-shadow:0 0 24px rgba(255,0,204,0.4)} }
</style></head><body>
<div class="lbl">Rainbow bar — section divider (2–3px)</div>
<div class="bar"></div>
<div class="lbl">Day chips</div>
<span class="day" style="background:#00FFFF">THU</span>
<span class="day" style="background:#FF00CC">FRI</span>
<span class="day" style="background:#FF6600">SAT</span>
<span class="day" style="background:#FF2400">SUN</span>
<div class="lbl">Live pill — attendance count</div>
<span class="pill"><span class="dot"></span>3 GOING</span>
<div class="lbl">Phrase picker options (RSVP modal)</div>
<div class="phrase active" style="--pc:#CCFF00"><span class="dot"></span>Hey, I'll be there!</div>
<div class="phrase" style="--pc:#FF00CC"><span class="dot"></span>Bringing the crew</div>
<div class="lbl">Glow card — missed connections (magenta pulse)</div>
<div class="spot" style="font-size:13px; color:#e6e3da;">You: green jacket, waterfront. Me: too shy. Coffee?</div>
</body></html>
