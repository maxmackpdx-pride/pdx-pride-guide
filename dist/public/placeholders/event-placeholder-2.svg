<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <pattern id="waves" width="60" height="30" patternUnits="userSpaceOnUse">
      <path d="M0 15 Q15 0 30 15 T60 15" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.4"/>
    </pattern>
    <radialGradient id="pulse" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow2"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="800" height="1000" fill="#030308"/>
  <rect width="800" height="1000" fill="url(#waves)"/>
  <rect width="800" height="1000" fill="url(#pulse)"/>
  <ellipse cx="400" cy="450" rx="200" ry="80" fill="#00FFFF" opacity="0.06" filter="url(#glow2)"/>
  <path d="M100 700 Q200 650 300 700 T500 700 T700 700" fill="none" stroke="#00FFFF" stroke-width="2" opacity="0.5"/>
  <path d="M80 750 Q250 700 400 750 T720 750" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.3"/>
  <rect x="50" y="50" width="700" height="900" fill="none" stroke="#00FFFF" stroke-width="2" opacity="0.35"/>
  <text x="400" y="400" text-anchor="middle" font-family="Impact, Haettenschweiler, sans-serif" font-size="64" font-weight="900" fill="#00FFFF" letter-spacing="4">WATERFRONT</text>
  <text x="400" y="480" text-anchor="middle" font-family="Impact, Haettenschweiler, sans-serif" font-size="28" font-weight="900" fill="#fff" letter-spacing="8" opacity="0.6">ENERGY</text>
  <text x="400" y="560" text-anchor="middle" font-family="monospace" font-size="16" fill="#00FFFF" opacity="0.45" letter-spacing="3">AWAITING POSTER</text>
  <circle cx="150" cy="200" r="4" fill="#00FFFF" opacity="0.8"/>
  <circle cx="650" cy="250" r="3" fill="#00FFFF" opacity="0.6"/>
  <circle cx="500" cy="180" r="5" fill="#CCFF00" opacity="0.5"/>
  <rect x="0" y="960" width="200" height="40" fill="#FF00CC"/>
  <rect x="200" y="960" width="200" height="40" fill="#CCFF00"/>
  <rect x="400" y="960" width="200" height="40" fill="#00FFFF"/>
  <rect x="600" y="960" width="200" height="40" fill="#FF6600"/>
</svg>