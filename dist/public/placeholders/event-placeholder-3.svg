  <line x1="500" y1="0" x2="700" y2="1000" stroke="#FF00CC" stroke-width="1" opacity="0.25"/>
  <line x1="0" y1="300" x2="800" y2="500" stroke="#FF00CC" stroke-width="1.5" opacity="0.35"/>
  <circle cx="400" cy="480" r="100" fill="#FF00CC" opacity="0.1" filter="url(#pinkglow)"/>
  <rect x="70" y="70" width="660" height="860" fill="none" stroke="#FF00CC" stroke-width="3"/>
  <rect x="90" y="90" width="620" height="820" fill="none" stroke="#331133" stroke-width="1"/>
  <text x="400" y="410" text-anchor="middle" font-family="Impact, Haettenschweiler, sans-serif" font-size="68" font-weight="900" fill="#FF00CC" letter-spacing="2">RAVE</text>
