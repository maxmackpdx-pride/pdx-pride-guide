<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#CCFF00" stroke-width="0.5" opacity="0.35"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#CCFF00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="800" height="1000" fill="#050505"/>
  <rect width="800" height="1000" fill="url(#grid)"/>
  <rect width="800" height="1000" fill="url(#glow)"/>
  <line x1="0" y1="200" x2="800" y2="600" stroke="#CCFF00" stroke-width="2" opacity="0.6"/>
  <line x1="800" y1="150" x2="0" y2="750" stroke="#CCFF00" stroke-width="1.5" opacity="0.4"/>
  <circle cx="400" cy="500" r="120" fill="#CCFF00" opacity="0.08" filter="url(#blur)"/>
  <rect x="60" y="60" width="680" height="880" fill="none" stroke="#CCFF00" stroke-width="3" opacity="0.5"/>
  <rect x="80" y="80" width="640" height="840" fill="none" stroke="#222" stroke-width="1" stroke-dasharray="8 6"/>
  <text x="400" y="420" text-anchor="middle" font-family="Impact, Haettenschweiler, sans-serif" font-size="72" font-weight="900" fill="#CCFF00" letter-spacing="6">PRIDE</text>
  <text x="400" y="500" text-anchor="middle" font-family="Impact, Haettenschweiler, sans-serif" font-size="36" font-weight="900" fill="#fff" letter-spacing="12" opacity="0.7">PDX</text>
  <text x="400" y="580" text-anchor="middle" font-family="monospace" font-size="18" fill="#CCFF00" opacity="0.5" letter-spacing="4">NO FLYER YET</text>
  <rect x="0" y="960" width="800" height="8" fill="#FF00CC"/>
  <rect x="0" y="968" width="800" height="8" fill="#CCFF00"/>
  <rect x="0" y="976" width="800" height="8" fill="#00FFFF"/>
  <rect x="0" y="984" width="800" height="8" fill="#FF6600"/>
</svg>